<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1200" role="img" aria-labelledby="title desc">
  <title id="title">Social analytics tools example interface</title>
  <desc id="desc">Illustrated analytics dashboard with charts and impact summary cards.</desc>
  <rect width="960" height="1200" fill="#f6f7fb"/>
  <rect x="52" y="52" width="856" height="1096" rx="42" fill="#ffffff" stroke="#d9dee7"/>
  <rect x="96" y="96" width="768" height="104" rx="30" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="132" y="158" fill="#111827" font-family="Manrope, Arial, sans-serif" font-size="40" font-weight="800">Social Analytics</text>
  <g fill="#eef2ff" stroke="#dbe2ff">
    <rect x="96" y="244" width="220" height="156" rx="24"/>
    <rect x="370" y="244" width="220" height="156" rx="24"/>
    <rect x="644" y="244" width="220" height="156" rx="24"/>
  </g>
  <g fill="#1f2937" font-family="Manrope, Arial, sans-serif" font-size="22">
