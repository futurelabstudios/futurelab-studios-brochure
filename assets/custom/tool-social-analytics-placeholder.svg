    <text x="398" y="354">78%</text>
    <text x="672" y="354">64%</text>
  </g>
  <rect x="96" y="450" width="768" height="292" rx="28" fill="#f9fbff" stroke="#dbe5f4"/>
  <text x="132" y="506" fill="#111827" font-family="Manrope, Arial, sans-serif" font-size="32" font-weight="800">Impact over time</text>
  <polyline points="150,676 256,626 356,654 470,548 586,570 690,478 810,424" fill="none" stroke="#2563eb" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#2563eb">
    <circle cx="150" cy="676" r="12"/>
    <circle cx="256" cy="626" r="12"/>
    <circle cx="356" cy="654" r="12"/>
    <circle cx="470" cy="548" r="12"/>
    <circle cx="586" cy="570" r="12"/>
    <circle cx="690" cy="478" r="12"/>
    <circle cx="810" cy="424" r="12"/>
  </g>
  <rect x="96" y="790" width="368" height="274" rx="28" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="496" y="790" width="368" height="274" rx="28" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="128" y="846" fill="#111827" font-family="Manrope, Arial, sans-serif" font-size="28" font-weight="700">Geographic spread</text>
  <text x="528" y="846" fill="#111827" font-family="Manrope, Arial, sans-serif" font-size="28" font-weight="700">Cohort insights</text>
  <g fill="#93c5fd">
